<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="dark">
  <title>Kairos Dashboard</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <header class="header">
    <div class="header-left">
      <svg class="header-mark" viewBox="0 0 20 20" width="20" height="20" aria-hidden="true">
        <path d="M10 2 L18 10 L10 18 L2 10 Z" fill="var(--accent-primary)" opacity="0.9"/>
        <path d="M10 6 L14 10 L10 14 L6 10 Z" fill="var(--bg-800)"/>
      </svg>
      <h1 class="header-title">Kairos Dashboard</h1>
      <span class="badge badge-count" id="run-count" aria-live="polite">loading&#8230;</span>
    </div>
    <div class="header-right">
      <button class="btn-icon" id="search-btn" aria-label="Search across runs" title="Search (/)">
        <svg viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><circle cx="7" cy="7" r="4"/><path d="M10 10l4 4"/></svg>
      </button>
      <button class="btn-toggle" id="refresh-toggle" aria-label="Toggle auto-refresh" aria-pressed="false">
        <span class="refresh-dot" id="refresh-dot"></span>
        <span id="refresh-label">Auto-refresh</span>
      </button>
      <select class="select-sm" id="refresh-interval" aria-label="Refresh interval">
        <option value="2000">2s</option>
        <option value="5000" selected>5s</option>
        <option value="10000">10s</option>
        <option value="30000">30s</option>
      </select>
    </div>
  </header>
  <main class="main" id="app">
    <div class="empty">Loading run history&#8230;</div>
  </main>
  <footer id="status-bar" role="status" aria-live="polite"><span id="status-text">Connecting&#8230;</span><button class="shortcuts-trigger" id="shortcuts-trigger" aria-label="Keyboard shortcuts">?</button></footer>
  <script src="/static/app.js"></script>
</body>
</html>
