<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kairos Dashboard</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <div class="header">
    <div class="header-left">
      <span class="header-title">Kairos Dashboard</span>
      <span class="badge badge-count" id="run-count">loading&#8230;</span>
    </div>
    <div class="header-right">
      <button class="btn-toggle" id="refresh-toggle" title="Toggle auto-refresh">
        <span class="refresh-dot" id="refresh-dot"></span>
        <span id="refresh-label">Auto-refresh</span>
      </button>
      <select class="select-sm" id="refresh-interval" title="Refresh interval">
        <option value="2000">2s</option>
        <option value="5000" selected>5s</option>
        <option value="10000">10s</option>
        <option value="30000">30s</option>
      </select>
    </div>
  </div>
  <div class="main" id="app">
    <div class="empty">Loading run history&#8230;</div>
  </div>
  <div id="status-bar">Connecting&#8230;</div>
  <script src="/static/app.js"></script>
</body>
</html>
