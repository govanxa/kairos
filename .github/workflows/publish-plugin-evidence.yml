name: Publish kairos-ai-evidence to PyPI

# Separate tag namespace from the core SDK (which uses "v*").
# Release the plugin by pushing a tag like: evidence-v0.1.0
on:
  push:
    tags:
      - "evidence-v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install build tools
        run: pip install build
      - name: Build plugin
        run: python -m build plugins/kairos-ai-evidence
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: plugins/kairos-ai-evidence/dist
